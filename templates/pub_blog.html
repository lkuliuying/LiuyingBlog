{% extends 'base.html' %}

{% block title %}发布博客{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{% static 'wangeditor/style.css' %}">
    <script src="{% static 'jquery/jquery-3.7.1.min.js' %}"></script>
    <script src="{% static 'wangeditor/index.js' %}"></script>
    <script src="{% static 'js/pub_blog.js' %}?v=2"></script>

    <style>
        #editor—wrapper {
            border: 1px solid #ccc;
            z-index: 100; /* 按需定义 */
        }

        #toolbar-container {
            border-bottom: 1px solid #ccc;
        }

        #editor-container {
            height: 500px;
        }
    </style>

{% endblock %}

{% block main %}

    {% if need_login %}
    <div class="modal fade" id="loginConfirmModal" tabindex="-1" aria-labelledby="loginConfirmModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="loginConfirmModalLabel">未登录提示</h1>
                </div>
                <div class="modal-body">
                    <p>您还未登录，请先登录后再发布博客。</p>
                    <p class="text-muted mb-0">是否现在前往登录页面？</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='/'">否</button>
                    <button type="button" class="btn btn-primary" onclick="window.location.href='{% url 'liuyingauth:login' %}'">是</button>
                </div>
            </div>
        </div>
    </div>
    {% else %}
    <h1>发布博客</h1>
    <div class="mt-3">
        <form action="" method="post">
        {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="form-label">标题</label>
                <input type="text" class="form-control" name="title" id="form-label">
            </div>
            <div class="mb-3">
                <label class="form-label" for="category-select">分类</label>
                <select type="text" class="form-select" name="category" id="category-select">
                    {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="form-label">内容</label>
                <div id="editor—wrapper">
                    <div id="toolbar-container"><!-- 工具栏 --></div>
                    <div id="editor-container"><!-- 编辑器 --></div>
                </div>
            </div>
            <div class="mb-3 text-end">
                <button type="submit" class="btn btn-primary" id="submit-btn">发布</button>
            </div>
        </form>
    </div>
    {% endif %}

{% endblock %}

{% block script %}
    {% if need_login %}
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var loginModal = new bootstrap.Modal(document.getElementById('loginConfirmModal'));
            loginModal.show();
        });
    </script>
    {% endif %}
{% endblock %}
