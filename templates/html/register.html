<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>流萤博客</title>
    <link rel="stylesheet" href="{% static  'bootstrap5/bootstrap.min.css' %}">
    <script src="{% static 'bootstrap5/popper.min.js' %}"></script>
    <script src="{% static 'bootstrap5/bootstrap.min.js' %}"></script>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
<header class="p-3 text-bg-light border-bottom mb-3">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
                <img src="{% static 'image/logo.png' %}" alt="logo" width="100" height="40" class="rounded">
            </a>

            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="#" class="nav-link px-2 text-secondary">首页</a></li>
                <li><a href="#" class="nav-link px-2 text-secondary">发布博客</a></li>
            </ul>

            <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
                <input type="search" class="form-control" placeholder="搜索" aria-label="Search">
            </form>

            <div class="text-end">
                <button type="button" class="btn btn-outline-primary me-2">登录</button>
                <button type="button" class="btn btn-primary">注册</button>
            </div>
        </div>
    </div>
</header>
<main class="container bg-white p-3 rounded">
    <div style="max-width:330px;" class="mx-auto">
        <h1>注册</h1>
        <form action="" method="post">
            <div class="mb-3">
                <label for="username">用户名</label>
                <input type="text" name='username' class="form-control" placeholder="用户名" id="username">
            </div>
            <div class="mb-3">
                <label for="email">邮箱</label>
                <input type="email" name='email' class="form-control" placeholder="邮箱" id="email">
            </div>

            <div class="mb-3">
                <label for="email">验证码</label>
                <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="验证码"
                       aria-label="Recipient’s username" aria-describedby="button-addon2">
                <button class="btn btn-outline-secondary" type="button">获取验证码</button>
                 </div>
            </div>

            <div class="mb-3">
                <label for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password">
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary w-100">立即注册</button>
            </div>
        </form>
    </div>

</main>
</body>
</html>
