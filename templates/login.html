{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block main %}
    <div style="max-width: 330px;" class="m-auto">
        <h1>登录</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form action="" method="post">
            {% csrf_token %}
            <div class="mb-3">
            <label for="email" class="form-label fw-bold">邮箱 / 用户名</label>
            <input type="text" name='email' class="form-control" placeholder="请输入绑定的邮箱或用户名" id="email" value="{{ form.email.value|default:'' }}">
             </div>
            <div class="mb-3">
                <label for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="密码">
            </div>
            <div class="form-check mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" value="1" id="checkDefault">
                    <label class="form-check-label" for="checkDefault">
                        记住我
                    </label>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary w-100">立即登录</button>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
