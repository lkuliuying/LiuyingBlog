<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>流萤博客注册验证码</title>
  <style>@media(max-width:620px){.shell{width:100%!important}.pad{padding-left:24px!important;padding-right:24px!important}.code{font-size:34px!important;letter-spacing:12px!important}}</style>
</head>
<body style="margin:0;background:#edf2f4;color:#19343a;font-family:'Microsoft YaHei','PingFang SC',sans-serif;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">您的注册验证码已送达，5 分钟内有效。</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#edf2f4;">
    <tr><td align="center" style="padding:40px 16px;">
      <table class="shell" role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px;max-width:600px;background:#fff;border:1px solid #c8d2d6;border-radius:18px;overflow:hidden;box-shadow:0 14px 36px rgba(42,75,82,.1);">
        <tr><td style="height:8px;font-size:0;background-color:#10aeb5;background-image:linear-gradient(90deg,#75dce0,#10aeb5,#93d4d8);">&nbsp;</td></tr>
        <tr><td class="pad" style="padding:34px 48px 24px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"><tr>
            <td width="50"><div style="width:46px;height:46px;color:#087d84;background:#e0f7f8;border:1px solid #91d9dd;border-radius:14px;font:700 25px/46px Georgia,serif;text-align:center;">流</div></td>
            <td style="padding-left:12px;"><div style="color:#173b41;font-size:18px;font-weight:700;letter-spacing:1px;">流萤博客</div><div style="color:#7b8d92;font-size:10px;letter-spacing:2px;">LIUYING BLOG</div></td>
            <td align="right"><span style="padding:6px 10px;color:#087d84;background:#e8f8f9;border:1px solid #b9e3e5;border-radius:20px;font-size:11px;">身份验证</span></td>
          </tr></table>
        </td></tr>
        <tr><td class="pad" style="padding:12px 48px 0;">
          <div style="color:#73878c;font-size:12px;letter-spacing:2px;">REGISTRATION ACCESS</div>
          <h1 style="margin:9px 0 0;color:#15383e;font:normal 30px/40px Georgia,'Microsoft YaHei',serif;">确认是你，继续书写。</h1>
          <p style="margin:14px 0 0;color:#5d7277;font-size:15px;line-height:26px;">你好，欢迎加入流萤博客。请在注册页面输入下方验证码，完成邮箱验证。</p>
        </td></tr>
        <tr><td class="pad" style="padding:28px 48px 0;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f1f5f6;border:1px solid #c9d5d8;border-radius:14px;">
            <tr><td align="center" style="padding:20px 18px 8px;color:#6d8388;font-size:12px;letter-spacing:2px;">本次验证码</td></tr>
            <tr><td style="padding:4px 18px 20px;"><div class="code" style="padding:16px 4px 16px 18px;color:#075f66;background:#fff;border:1px solid #9dcfd2;border-bottom:3px solid #13aeb5;border-radius:10px;font:700 38px/48px Consolas,monospace;letter-spacing:18px;text-align:center;">{{ captcha }}</div></td></tr>
          </table>
        </td></tr>
        <tr><td class="pad" style="padding:20px 48px 34px;color:#687c81;font-size:13px;line-height:22px;">ⓘ&nbsp; 验证码将在 <strong style="color:#38585e;">5 分钟</strong>后失效。请勿将验证码转发或告知他人。</td></tr>
        <tr><td class="pad" style="padding:22px 48px;background-color:#e7ecee;border-top:1px solid #d4dde0;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0"><tr>
            <td style="color:#70858a;font-size:12px;">如果这不是你的操作，请忽略此邮件。</td>
            <td align="right" style="color:#8a9a9e;font-size:10px;letter-spacing:1px;">CYAN · SILVER · SECURE</td>
          </tr></table>
        </td></tr>
      </table>
      <div style="padding-top:18px;color:#97a5a9;font-size:11px;">此邮件由系统自动发送，请勿直接回复。</div>
    </td></tr>
  </table>
</body>
</html>
